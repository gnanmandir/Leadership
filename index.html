<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipbook</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/blasten/turn.js/turn.min.js"></script>

<style>
body {
    margin: 0;
    background: #0d0d0d;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    color: white;
    overflow: hidden;
}

/* Flipbook */
#flipbook {
    display: none;
    margin: auto;
}

/* Page */
.page {
    background: #111;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

.page img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Center fold */
#flipbook::before {
    content: "";
    position: absolute;
    width: 12px;
    height: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.05);
    z-index: 10;
}

/* Topbar */
.topbar {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 20;
    display: flex;
    gap: 8px;
}

.btn {
    padding: 8px 12px;
    border-radius: 20px;
    border: none;
    background: rgba(255,255,255,0.08);
    color: white;
    cursor: pointer;
}

/* Counter */
.counter {
    position: fixed;
    bottom: 10px;
    width: 100%;
    text-align: center;
    font-size: 13px;
}

/* Thumbnails */
.thumbs {
    position: fixed;
    bottom: 40px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 10px;
}

.thumbs img {
    height: 60px;
    border-radius: 6px;
    cursor: pointer;
    opacity: 0.5;
}

.thumbs img.active {
    opacity: 1;
    border: 2px solid white;
}

/* Mobile */
@media (max-width: 768px) {

    #flipbook {
        width: 100vw !important;
        height: 85vh !important;
    }

    .thumbs {
        display: none;
    }

    .page img {
        object-fit: contain;
    }
}
</style>
</head>

<body>

<div id="loader">Loading book...</div>

<div class="topbar">
    <button class="btn" onclick="toggleFullscreen()">⛶</button>
    <button class="btn" onclick="toggleThumbs()">☰</button>
</div>

<div id="flipbook"></div>

<div class="counter" id="counter">1 / 16</div>

<div class="thumbs" id="thumbs"></div>

<script>
const totalPages = 16;
let loaded = 0;
let images = [];

// Preload images
for (let i = 1; i <= totalPages; i++) {
    let img = new Image();
    img.src = `page${i}.jpg`;

    img.onload = () => {
        loaded++;
        if (loaded === totalPages) initBook();
    };

    images.push(img);
}

function initBook() {

    const flipbook = document.getElementById("flipbook");

    let ratio = images[0].width / images[0].height;

    let width = window.innerWidth * 0.9;
    let height = width / ratio;

    if (height > window.innerHeight * 0.85) {
        height = window.innerHeight * 0.85;
        width = height * ratio;
    }

    // Create pages
    for (let i = 0; i < totalPages; i++) {
        let div = document.createElement("div");
        div.className = "page";

        let img = images[i];
        div.appendChild(img);

        flipbook.appendChild(div);
    }

    // Thumbnails
    for (let i = 1; i <= totalPages; i++) {
        let thumb = document.createElement("img");
        thumb.src = `page${i}.jpg`;

        thumb.onclick = () => $('#flipbook').turn('page', i);

        document.getElementById("thumbs").appendChild(thumb);
    }

    document.getElementById("loader").style.display = "none";
    flipbook.style.display = "block";

    $('#flipbook').turn({
        width: width,
        height: height,
        autoCenter: true,
        elevation: 120,
        gradients: true,
        duration: 700,
        when: {
            turned: function(e, page) {
                document.getElementById("counter").innerText = page + " / " + totalPages;

                document.querySelectorAll(".thumbs img").forEach((img, i) => {
                    img.classList.toggle("active", i+1 === page);
                });
            }
        }
    });

    // Swipe
    let startX = 0;

    document.addEventListener("touchstart", e => {
        startX = e.touches[0].clientX;
    });

    document.addEventListener("touchend", e => {
        let endX = e.changedTouches[0].clientX;

        if (startX - endX > 50) {
            $('#flipbook').turn('next');
        } else if (endX - startX > 50) {
            $('#flipbook').turn('previous');
        }
    });
}

// Fullscreen
function toggleFullscreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

// Toggle thumbnails
function toggleThumbs() {
    let thumbs = document.getElementById("thumbs");
    thumbs.style.display = (thumbs.style.display === "flex") ? "none" : "flex";
}

// Fix resize
window.addEventListener("resize", () => {
    location.reload();
});
</script>

</body>
</html>
