<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Magazines</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/page-flip/dist/css/page-flip.css">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

h1 {
  text-align: center;
  color: red;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 20px;
}

.book {
  background: white;
  padding: 10px;
  border-radius: 15px;
  cursor: pointer;
  transition: 0.3s;
}

.book:hover {
  transform: scale(1.05);
}

.book img {
  width: 100%;
  border-radius: 10px;
}

/* MODAL */
#viewerModal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

/* CLOSE */
.close {
  position: absolute;
  top: 20px;
  right: 30px;
  color: white;
  font-size: 30px;
  cursor: pointer;
}

/* BOOK */
#book {
  width: 90vw;
  max-width: 900px;
  height: 600px;
}

/* NAV BUTTONS */
.nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 40px;
  color: white;
  cursor: pointer;
  user-select: none;
}

.left { left: 20px; }
.right { right: 20px; }

/* PAGE */
.page img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* BOTTOM CONTROLS */
.controls {
  position: absolute;
  bottom: 20px;
  background: white;
  padding: 10px 20px;
  border-radius: 10px;
  display: flex;
  gap: 15px;
  align-items: center;
}

.controls button {
  border: none;
  background: #eee;
  padding: 5px 10px;
  cursor: pointer;
  border-radius: 5px;
}

</style>
</head>

<body>

<h1>Magazines</h1>

<div class="grid">
  <div class="book" onclick="openBook('book1')">
    <img src="books/book1/1.jpg">
    <p>Book 1</p>
  </div>

  <div class="book" onclick="openBook('book2')">
    <img src="books/book2/1.jpg">
    <p>Book 2</p>
  </div>
</div>

<!-- MODAL -->
<div id="viewerModal">

  <div class="close" onclick="closeBook()">✖</div>

  <div class="nav left" onclick="prevPage()">❮</div>
  <div class="nav right" onclick="nextPage()">❯</div>

  <div id="book"></div>

  <div class="controls">
    <button onclick="prevPage()">⬅</button>
    <span id="pageInfo">1 / 16</span>
    <button onclick="nextPage()">➡</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<script>

let pageFlip;
let totalPages = 16;

function openBook(bookName) {

  const modal = document.getElementById("viewerModal");
  const container = document.getElementById("book");

  container.innerHTML = "";

  for (let i = 1; i <= totalPages; i++) {
    const div = document.createElement("div");
    div.classList.add("page");

    const img = document.createElement("img");
    img.src = `books/${bookName}/${i}.jpg`;

    div.appendChild(img);
    container.appendChild(div);
  }

  modal.style.display = "flex";

  setTimeout(() => {

    pageFlip = new St.PageFlip(container, {
      width: 450,
      height: 600,
      size: "stretch",
      showCover: true
    });

    pageFlip.loadFromHTML(document.querySelectorAll(".page"));

    updatePageInfo();

    pageFlip.on("flip", () => {
      updatePageInfo();
    });

  }, 100);
}

function closeBook() {
  document.getElementById("viewerModal").style.display = "none";
}

function nextPage() {
  if (pageFlip) pageFlip.flipNext();
}

function prevPage() {
  if (pageFlip) pageFlip.flipPrev();
}

function updatePageInfo() {
  const current = pageFlip.getCurrentPageIndex() + 1;
  document.getElementById("pageInfo").innerText = `${current} / ${totalPages}`;
}

</script>

</body>
</html>
